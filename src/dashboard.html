<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsPulse Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Dashboard specific overrides and styling */
      body {
        background: #121212;
        color: #e8e8ec;
        font-family: 'Inter', -apple-system, sans-serif;
        margin: 0;
        padding: 0;
        overflow-y: auto;
      }
      .db-container {
        max-width: 1200px;
        width: 90%;
        margin: 0 auto;
        padding: 20px 16px;
      }
      .db-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        border-bottom: 1px solid #1e1e24;
        padding-bottom: 14px;
      }
      .db-logo {
        font-size: 16px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .db-logo span {
        font-size: 18px;
      }
      .db-tabs {
        display: flex;
        gap: 8px;
        background: #1c1c1c;
        padding: 4px;
        border-radius: 6px;
        border: 1px solid #2d2d2d;
      }
      .db-tab {
        background: transparent;
        border: none;
        color: #8b8fa0;
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 700;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .db-tab.active {
        background: #2d2d2d;
        color: #ffffff;
      }
      .section-title {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #6b6f7b;
        margin: 20px 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 12px;
      }
      .league-group {
        margin-bottom: 20px;
      }
      .league-group-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #8b8fa0;
        margin-bottom: 8px;
        padding-left: 8px;
        border-left: 2px solid #5a9bd5;
        padding-top: 1px;
        padding-bottom: 1px;
        line-height: 1.2;
      }
      .league-group-title.live-border {
        border-left-color: #ff4a4a;
      }
      .match-card {
        background: #1c1c1c;
        border: 1px solid #2d2d2d;
        border-radius: 8px;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
      }
      .match-card:hover {
        border-color: #3d3d3d;
        transform: translateY(-1px);
        background: #222222;
      }
      .match-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .match-title {
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .match-series {
        font-size: 10px;
        font-weight: 500;
        color: #6b6f7b;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .match-status {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .status-live {
        color: #ff4a4a;
      }
      .status-upcoming {
        color: #5a9bd5;
      }
      .track-btn {
        background: #242424;
        color: #ffffff;
        border: 1px solid #2d2d2d;
        padding: 6px 12px;
        font-size: 10px;
        font-weight: 700;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .track-btn:hover {
        background: #2d2d2d;
        border-color: #3d3d3d;
      }
      .tracked-badge {
        background: rgba(116, 198, 157, 0.1);
        color: #74c69d;
        border: 1px solid rgba(116, 198, 157, 0.2);
        padding: 5px 10px;
        font-size: 9px;
        font-weight: 800;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 0 8px rgba(116, 198, 157, 0.05);
      }
      .tracked-badge.clickable-badge {
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tracked-badge.clickable-badge:hover {
        background: rgba(255, 74, 74, 0.15);
        color: #ff4a4a;
        border-color: rgba(255, 74, 74, 0.3);
      }
      .empty-state {
        text-align: center;
        padding: 30px;
        background: #1c1c1c;
        border: 1px solid #2d2d2d;
        border-radius: 8px;
        color: #6b6f7b;
        font-size: 12px;
        font-weight: 500;
      }
      /* Loading Screen styles */
      .loading-overlay {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        color: #8b8fa0;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #5a9bd5;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin: 0;
        color: #6b6f7b;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #121212;
      }
      ::-webkit-scrollbar-thumb {
        background: #2d2d2d;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="db-container">
      <header class="db-header">
        <div class="db-logo">
          <span>🏏 ⚽</span> SportsPulse Dashboard
        </div>
        <div class="db-tabs">
          <button id="tab-cricket" class="db-tab active">Cricket</button>
          <button id="tab-football" class="db-tab">Football</button>
        </div>
      </header>

      <!-- Initial Loading Screen -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Fetching matches...</p>
      </div>

      <!-- Live Section -->
      <h2 class="section-title hidden">🔴 Live Matches</h2>
      <div id="live-list" class="hidden">
        <div class="empty-state">No live matches currently</div>
      </div>

      <!-- Upcoming Section -->
      <h2 class="section-title hidden">⏳ Upcoming Matches</h2>
      <div id="upcoming-list" class="hidden">
        <div class="empty-state">No upcoming matches currently</div>
      </div>
    </div>
    <script type="module" src="/dashboard.js" defer></script>
  </body>
</html>
