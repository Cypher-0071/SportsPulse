<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsPulse Alert</title>
    <style>
      html { background: transparent; }

      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
        font-size: 13px;
        line-height: 1.4;
        color: #e8e8ec;
        background: transparent;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: transparent;
      }

      .popup {
        width: 100%;
        height: 100vh;
        background: #111116;
        border: 1px solid #232329;
        border-radius: 10px;
        box-sizing: border-box;
        display: flex;
        align-items: stretch;
        overflow: hidden;
        animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }

      /* Colored left strip */
      .accent-strip {
        width: 4px;
        flex-shrink: 0;
        background: #00b4d8;
        transition: background 0.2s;
      }
      .popup.four   .accent-strip { background: #f0b429; }
      .popup.six    .accent-strip { background: #e63946; }
      .popup.wicket .accent-strip { background: #ff4a4a; }
      .popup.goal   .accent-strip { background: #38b000; }
      .popup.redcard .accent-strip { background: #d90429; }
      
      /* Win celebration animated gradient accent */
      .popup.win .accent-strip {
        background: linear-gradient(to bottom, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ffea00);
        background-size: 100% 400%;
        animation: rainbowAccent 2.5s ease infinite alternate;
      }

      /* Big emoji / run count on the left */
      .event-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        flex-shrink: 0;
        font-size: 24px;
        font-weight: 900;
        color: #f0b429;
        letter-spacing: -1px;
      }
      .popup.six    .event-icon { color: #e63946; }
      .popup.wicket .event-icon { color: #ff4a4a; }
      .popup.goal   .event-icon { color: #38b000; }
      .popup.redcard .event-icon { color: #d90429; }
      .popup.win    .event-icon {
        animation: rainbowText 2.5s ease infinite alternate;
      }

      /* Text area */
      .event-body {
        flex: 1;
        padding: 6px 8px 6px 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 1px;
        min-width: 0;
      }

      .event-headline {
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .event-detail {
        font-size: 12px;
        font-weight: 600;
        color: #8b8fa0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Close button */
      .close-btn {
        position: absolute;
        top: 6px;
        right: 8px;
        background: transparent;
        border: none;
        color: #3a3a42;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        transition: color 0.15s;
      }
      .close-btn:hover { color: #6b6f7b; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes rainbowAccent {
        0% { background-position: 0% 0%; }
        100% { background-position: 0% 100%; }
      }

      @keyframes rainbowText {
        0%   { color: #ff007f; }
        33%  { color: #7f00ff; }
        66%  { color: #00f0ff; }
        100% { color: #ffea00; }
      }

      /* ─── Soccer Broadcast Overlay Notification Theme ─── */
      .popup.soccer-theme {
        background: #09090b;
        border: 1px solid #22222a;
      }
      .popup.soccer-theme .event-icon {
        font-size: 26px;
        filter: drop-shadow(0 0 5px rgba(56,176,0,0.3));
      }
      .popup.soccer-theme.redcard .event-icon {
        filter: drop-shadow(0 0 5px rgba(217,4,41,0.3));
      }
      .popup.soccer-theme .event-headline {
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-size: 11px;
        color: #38b000;
      }
      .popup.soccer-theme.redcard .event-headline {
        color: #d90429;
      }
      .popup.soccer-theme .event-detail {
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="popup" class="popup">
      <div class="accent-strip"></div>
      <div id="event-icon" class="event-icon">4</div>
      <div class="event-body">
        <div id="event-headline" class="event-headline">—</div>
        <div id="event-detail" class="event-detail">—</div>
      </div>
      <button id="close-btn" class="close-btn">×</button>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      const popup      = document.getElementById("popup");
      const iconEl     = document.getElementById("event-icon");
      const headlineEl = document.getElementById("event-headline");
      const detailEl   = document.getElementById("event-detail");
      const closeBtn   = document.getElementById("close-btn");

      closeBtn.addEventListener("click", () => invoke("hide_mini_popup"));

      function getCleanEventDetail(description, eventType) {
        if (!description) return "";

        // Soccer cleanup
        if (description.includes(" Own Goal")) {
          return description.split(" Own Goal")[0].trim();
        }
        if (description.includes(" Goal")) {
          return description.split(" Goal")[0].trim();
        }
        if (description.includes(" Penalty")) {
          return description.split(" Penalty")[0].trim();
        }
        if (description.includes(" Red Card")) {
          return description.split(" Red Card")[0].trim();
        }
        if (description.includes(" Yellow Card")) {
          return description.split(" Yellow Card")[0].trim();
        }

        // Cricket cleanup
        if (eventType === "Wicket") {
          if (description.includes(":")) {
            return description.split(":")[0].trim();
          }
          return description;
        }

        if (eventType === "Boundary") {
          if (description.includes(" to ")) {
            let afterTo = description.split(" to ")[1];
            if (afterTo && afterTo.includes(",")) {
              return afterTo.split(",")[0].trim();
            }
            return afterTo || description;
          }
        }

        if (eventType === "Win") {
          return description;
        }

        return description;
      }

      function applyEvent(payload) {
        if (!payload) return;

        const type = payload.event_type;  // "Boundary" | "Wicket" | "Win"
        const isSix = payload.title && payload.title.includes("SIX");
        const titleStr = payload.title || "";

        // CSS class for color theme
        popup.className = "popup";
        
        if (payload.sport === "soccer") {
          popup.classList.add("soccer-theme");
        }

        if (titleStr.includes("GOAL")) {
          popup.classList.add("goal");
          iconEl.textContent = "⚽";
        } else if (titleStr === "RED CARD!") {
          popup.classList.add("redcard");
          iconEl.textContent = "🟥";
        } else if (type === "Wicket") {
          popup.classList.add("wicket");
          iconEl.textContent = "🎯";
        } else if (type === "Boundary") {
          if (isSix) {
            popup.classList.add("six");
            iconEl.textContent = "6";
          } else {
            popup.classList.add("four");
            iconEl.textContent = "4";
          }
        } else if (type === "Win") {
          popup.classList.add("win");
          iconEl.textContent = "🏆";
        }

        headlineEl.textContent = titleStr || "Event";
        detailEl.textContent   = getCleanEventDetail(payload.description, type);
      }

      async function fetchAndApply() {
        try {
          const ev = await invoke("get_latest_event");
          applyEvent(ev);
        } catch (e) {
          console.error("get_latest_event failed:", e);
        }
      }

      listen("match-event", (e) => applyEvent(e.payload));
      window.addEventListener("focus", fetchAndApply);
      fetchAndApply();
    </script>
  </body>
</html>
