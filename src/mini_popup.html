<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsPulse Alert</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        line-height: 1.3;
        color: #e4e6eb;
        background-color: transparent;
        user-select: none;
      }

      body {
        margin: 0;
        padding: 0;
        width: 300px;
        height: 100px;
        overflow: hidden;
        background-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .alert-card {
        width: 280px;
        height: 80px;
        background: rgba(18, 18, 22, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 8px 10px;
        box-sizing: border-box;
        border-left: 4px solid #00b4d8; /* Default accent */
        animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .close-btn {
        background: transparent;
        border: none;
        color: #a0a5b5;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        padding: 0;
        margin: 0;
        line-height: 1;
        transition: color 0.15s;
      }

      .close-btn:hover {
        color: #ffffff;
      }

      .description {
        font-size: 11.5px;
        font-weight: 600;
        color: #ffffff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin: 4px 0;
      }

      .score {
        font-size: 10px;
        font-weight: 700;
        color: #a0a5b5;
      }

      /* Event specific accents */
      .alert-card.wicket {
        border-left-color: #ff4a4a;
      }
      .alert-card.wicket .title {
        color: #ff4a4a;
      }

      .alert-card.boundary {
        border-left-color: #ffb703;
      }
      .alert-card.boundary .title {
        color: #ffb703;
      }

      .alert-card.over-complete {
        border-left-color: #74c69d;
      }
      .alert-card.over-complete .title {
        color: #74c69d;
      }

      @keyframes slideIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="alert-card" class="alert-card">
      <div class="header">
        <span id="event-title" class="title">Alert</span>
        <button id="close-btn" class="close-btn">×</button>
      </div>
      <div id="event-desc" class="description">Event description detail...</div>
      <div id="event-score" class="score">Score update</div>
    </div>

    <script type="module" src="mini_popup.js"></script>
  </body>
</html>
