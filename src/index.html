<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsPulse Scoreboard</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Main Scoreboard Popup Card -->
    <main id="scoreboard-card" class="card hidden">
      <header class="header">
        <span id="match-title" class="title">IND vs ENG • 1st ODI</span>
        <span id="live-indicator" class="live-tag">🔴 LIVE</span>
      </header>
      
      <section class="scores">
        <!-- Team 1 Row -->
        <div id="team1-row" class="team-row">
          <div class="team-info">
            <span id="team1-name" class="team-name">INDIA</span>
            <span id="team1-batting-dot" class="batting-dot hidden">🏏</span>
          </div>
          <span id="team1-score" class="team-score">0/0 (0.0 ov)</span>
        </div>
        
        <!-- Team 2 Row -->
        <div id="team2-row" class="team-row">
          <div class="team-info">
            <span id="team2-name" class="team-name">ENGLAND</span>
            <span id="team2-batting-dot" class="batting-dot hidden">🏏</span>
          </div>
          <span id="team2-score" class="team-score">Yet to bat</span>
        </div>
      </section>
      
      <footer id="stats-row" class="stats-bar">
        <div class="stat-item">CRR: <span id="crr-val">0.00</span></div>
        <div id="rrr-container" class="stat-item hidden">RRR: <span id="rrr-val">0.00</span></div>
        <div id="need-container" class="stat-item hidden"><span id="need-val">Need 0 runs</span></div>
      </footer>
    </main>

    <!-- No Match Placeholder Card -->
    <main id="no-match-card" class="card">
      <div class="no-match-content">
        <span class="no-match-icon">🏏</span>
        <p class="no-match-text">No live match right now</p>
      </div>
    </main>
  </body>
</html>
