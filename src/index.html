<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsPulse Scoreboard</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Main Scoreboard Popup Card -->
    <main id="scoreboard-card" class="card hidden">
      <header class="header">
        <span id="match-title" class="title">IND vs ENG</span>
        <span id="live-indicator" class="live-tag">LIVE</span>
      </header>
      
      <!-- Cricket layout: stacked rows -->
      <section class="scores" id="cricket-scores">
        <div id="team1-row" class="team-row">
          <div class="team-info">
            <span id="team1-name" class="team-name">INDIA</span>
            <span id="team1-batting-dot" class="batting-dot hidden">●</span>
          </div>
          <span id="team1-score" class="team-score">0/0 (0.0)</span>
        </div>
        
        <div id="team2-row" class="team-row">
          <div class="team-info">
            <span id="team2-name" class="team-name">ENGLAND</span>
            <span id="team2-batting-dot" class="batting-dot hidden">●</span>
          </div>
          <span id="team2-score" class="team-score">Yet to bat</span>
        </div>
      </section>

      <!-- Football layout: horizontal broadcast bar -->
      <section class="scores hidden" id="football-scores">
        <div class="fb-team fb-team-left">
          <span id="fb-team1-name" class="fb-team-name"></span>
        </div>
        <span id="fb-team1-score" class="fb-score-box">0</span>
        <div class="fb-center">
          <span id="fb-clock" class="fb-clock">-</span>
          <span id="fb-sub" class="fb-sub"></span>
        </div>
        <span id="fb-team2-score" class="fb-score-box">0</span>
        <div class="fb-team fb-team-right">
          <span id="fb-team2-name" class="fb-team-name"></span>
        </div>
      </section>
      
      <footer id="stats-row" class="stats-bar">
        <div class="stats-left" id="stats-left-el">
          <div class="stat-item">CRR <span id="crr-val">0.00</span></div>
          <span id="rrr-sep" class="stat-sep hidden">·</span>
          <div id="rrr-container" class="stat-item hidden">RRR <span id="rrr-val">0.00</span></div>
          <span id="need-sep" class="stat-sep hidden">·</span>
          <div id="need-container" class="stat-item hidden"><span id="need-val">Need 0</span></div>
        </div>
        <div id="target-container" class="stat-item hidden target-right">TGT <span id="target-val">0</span></div>
      </footer>
    </main>

    <!-- No Match Placeholder Card -->
    <main id="no-match-card" class="card">
      <div class="no-match-content">
        <span class="no-match-icon">🏏 ⚽</span>
        <p class="no-match-text">No live match right now</p>
      </div>
    </main>
  </body>
</html>
